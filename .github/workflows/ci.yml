name: ci

# Lint, typecheck, and test on every push and pull request to main. The release
# workflow (release.yml) is separate and only fires on version tags.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build frontend
        run: npm run build

  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri needs the system webview/GTK libs to compile on Linux.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # Two compile-time checks in the Tauri crate need on-disk artifacts that CI
      # doesn't otherwise produce, and that the unit tests never actually use:
      #   1. tauri-build verifies the externalBin sidecars exist for the host
      #      target triple. We ship no Linux sidecar (the app targets macOS/
      #      Windows), so empty placeholders satisfy the check.
      #   2. generate_context! embeds frontendDist (../dist). A stub index.html
      #      lets the crate compile without a full frontend build.
      - name: Stub sidecars and frontendDist for the build check
        run: |
          mkdir -p src-tauri/binaries
          triple=x86_64-unknown-linux-gnu
          for bin in ffmpeg ffprobe yt-dlp; do
            touch "src-tauri/binaries/${bin}-${triple}"
            chmod +x "src-tauri/binaries/${bin}-${triple}"
          done
          mkdir -p dist
          echo '<!doctype html><title>ci</title>' > dist/index.html

      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --all --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: src-tauri
        run: cargo test
