name: release

# Build installers and publish a draft GitHub Release when a v* tag is pushed.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # One universal macOS .dmg built on the Apple Silicon runner (arm64
          # native + x86_64 cross). Avoids the scarce, deprecated macos-13 Intel
          # runner entirely.
          - platform: macos-14
            rustTargets: aarch64-apple-darwin,x86_64-apple-darwin
            tauriTarget: universal-apple-darwin
          - platform: windows-latest
            rustTargets: x86_64-pc-windows-msvc
            tauriTarget: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      # FFmpeg/ffprobe sidecars must exist before the Tauri bundle step.
      - name: Fetch FFmpeg sidecars (Windows, LGPL static)
        if: runner.os == 'Windows'
        shell: bash
        run: bash scripts/fetch-ffmpeg.sh

      - name: Build FFmpeg sidecars (macOS, LGPL from source)
        if: runner.os == 'macOS'
        run: |
          brew install nasm
          bash scripts/build-ffmpeg-macos.sh

      - name: Fetch yt-dlp sidecar
        shell: bash
        run: bash scripts/fetch-ytdlp.sh

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "GifSmith ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.tauriTarget }}
